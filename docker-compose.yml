name: fishrag

services:
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fishrag-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FISHRAG_DATABASE_URL: postgresql+asyncpg://fishrag:fishrag@postgres:5432/fishrag
      FISHRAG_REDIS_URL: redis://redis:6379/0
      FISHRAG_OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "${FISHRAG_API_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  web:
    profiles: ["app"]
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: fishrag-web
    restart: unless-stopped
    ports:
      - "${FISHRAG_WEB_PORT:-5173}:80"
    depends_on:
      - api

  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16-bookworm}
    container_name: fishrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fishrag}
      POSTGRES_USER: ${POSTGRES_USER:-fishrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishrag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fishrag} -d ${POSTGRES_DB:-fishrag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: fishrag-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.15.0}
    container_name: fishrag-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "${OPENSEARCH_DISABLE_SECURITY:-true}"
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.54.1}
    container_name: fishrag-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.1.4}
    container_name: fishrag-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-fishrag}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  grafana_data:
